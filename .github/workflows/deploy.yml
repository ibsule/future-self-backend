name: Build and Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build images
      - name: Build API image
        run: |
          docker build \
            -f docker/api.Dockerfile \
            -t ghcr.io/${{ github.repository }}-api:${{ github.sha }} \
            .

      - name: Build Web image
        run: |
          docker build \
            -f docker/web.Dockerfile \
            -t ghcr.io/${{ github.repository }}-web:${{ github.sha }} \
            .

      # 4. Push images
      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}-web:${{ github.sha }}

      # 5. Deploy on VPS
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            API_IMAGE=ghcr.io/${{ github.repository }}-api:${{ github.sha }}
            WEB_IMAGE=ghcr.io/${{ github.repository }}-web:${{ github.sha }}
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/deployed_apps/futureself-mono
            docker compose pull
            API_IMAGE=$API_IMAGE WEB_IMAGE=$WEB_IMAGE docker compose up -d --no-deps --force-recreate