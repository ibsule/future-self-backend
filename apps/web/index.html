<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var prefersDark =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var root = document.documentElement;
        var body = document.body;
        root.style.backgroundColor = prefersDark ? '#0c0c0c' : '#f4f1ea';
        root.style.color = prefersDark ? '#e8e4dc' : '#121212';
        if (body) {
          body.style.backgroundColor = prefersDark ? '#0c0c0c' : '#f4f1ea';
          body.style.color = prefersDark ? '#e8e4dc' : '#121212';
        } else {
          document.addEventListener(
            'DOMContentLoaded',
            function () {
              document.body.style.backgroundColor = prefersDark ? '#0c0c0c' : '#f4f1ea';
              document.body.style.color = prefersDark ? '#e8e4dc' : '#121212';
            },
            { once: true }
          );
        }
      })();
    </script>
    <title>Futureself</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
